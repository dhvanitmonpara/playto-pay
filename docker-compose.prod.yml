services:
  api:
    container_name: playto-api
    build:
      context: ./server
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    env_file:
      - .env.production
    expose:
      - "8000"
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - caddy_net
      - backend

  celery:
    container_name: playto-celery
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A config worker -l warning --concurrency=1 --pool=solo
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.25"
    networks:
      - backend

  celery-beat:
    container_name: playto-celery-beat
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A config beat -l warning
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.15"
    networks:
      - backend

networks:
  caddy_net:
    external: true

  backend:
    internal: true